<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talental — Client Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../../assets/logo-mark.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="./data.js"></script>
<script type="text/babel" src="../_shared/Icons.jsx"></script>
<script type="text/babel" src="../_shared/Wordmark.jsx"></script>
<script type="text/babel" src="./TopBar.jsx"></script>
<script type="text/babel" src="./SearchList.jsx"></script>
<script type="text/babel" src="./Pipeline.jsx"></script>
<script type="text/babel" src="./CandidatePanel.jsx"></script>
<script type="text/babel" src="./SearchDetail.jsx"></script>

<script type="text/babel">
function App() {
  const [activeId, setActiveId] = React.useState("s1");
  const [openCand, setOpenCand] = React.useState(null);
  const search = PORTAL_SEARCHES.find((s) => s.id === activeId);
  return (
    <div className="pt-app">
      <PortalTopBar search={search} />
      <div className="pt-main">
        <SearchList active={activeId} onPick={(id) => { setActiveId(id); setOpenCand(null); }} />
        <SearchDetail
          search={search}
          openCandidate={openCand?.id}
          onPickCandidate={(c) => setOpenCand(c)}
        />
      </div>
      <CandidatePanel candidate={openCand} open={!!openCand} onClose={() => setOpenCand(null)} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
