<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talental</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header>
      <strong>Talental</strong>
    </header>

    <section>
      <div id="status" class="status status-checking">Verificando sesión…</div>
      <p class="hint" id="usage">
        Abre cualquier perfil de
        <a href="https://www.linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
        y verás el panel para agregar el candidato.
      </p>
      <a id="open-ats" class="link-btn" href="#" target="_blank" rel="noopener">
        Abrir Talental →
      </a>
    </section>

    <details class="settings">
      <summary>Configuración avanzada</summary>
      <label for="backend">URL del ATS</label>
      <input id="backend" type="url" placeholder="https://app.talental.mx" />
      <p class="hint muted">
        Solo cámbialo si estás probando un preview de Vercel o
        localhost.
      </p>
    </details>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
