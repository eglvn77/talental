<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talental</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header>
      <strong>Talental</strong>
      <span class="muted">Guardar a tu ATS</span>
    </header>

    <section>
      <div id="status" class="status status-checking">Verificando sesión…</div>
      <button id="save" type="button" disabled>Guardar página actual</button>
      <p id="hint" class="hint"></p>
    </section>

    <section class="settings">
      <label for="backend">URL del ATS</label>
      <input id="backend" type="url" placeholder="https://app.talental.mx" />
      <p class="hint muted">
        Cambia a la URL del preview si pruebas en branch testing.
      </p>
    </section>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
